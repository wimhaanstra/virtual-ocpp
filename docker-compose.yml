services:
  virtual-ocpp:
    build: .
    image: ${VIRTUAL_OCPP_IMAGE:-virtual-ocpp:local}
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      SQLITE_PATH: ${DOCKER_SQLITE_PATH:-/data/virtual-ocpp.sqlite}
      WEB_DIST_PATH: /app/apps/web/dist
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      OCPP_PUBLIC_URL: ${OCPP_PUBLIC_URL:-ws://localhost:${HOST_PORT:-3000}/ocpp/:chargerId}
      COMMUNICATION_LOG_RETENTION_HOURS: ${COMMUNICATION_LOG_RETENTION_HOURS:-24}
      CHARGER_SILENT_AFTER_SECONDS: ${CHARGER_SILENT_AFTER_SECONDS:-300}
      METER_GAP_THRESHOLD_WH: ${METER_GAP_THRESHOLD_WH:-1000}
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    volumes:
      - virtual-ocpp-data:/data
    restart: unless-stopped

volumes:
  virtual-ocpp-data:
