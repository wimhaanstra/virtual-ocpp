services:
  virtual-ocpp:
    labels:
      - traefik.enable=true
      - traefik.http.routers.virtual-ocpp.rule=Host(`${VIRTUAL_OCPP_HOST:?Set VIRTUAL_OCPP_HOST in .env}`)
      - traefik.http.routers.virtual-ocpp.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.virtual-ocpp.tls=true
      - traefik.http.routers.virtual-ocpp.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.virtual-ocpp.loadbalancer.server.port=8797
    networks:
      - default
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
